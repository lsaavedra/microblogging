version: '3.8'

services:
  api:
    container_name: api
    tty: true
    build: .
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    environment:
      ENV: local
      POSTGRES_HOST: blog-db
    depends_on:
      blog-db:
        condition: service_healthy

  blog-db:
    container_name: api-db
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: microblogging
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microblogging"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - api_postgres_data:/var/lib/postgresql/data

  test:
    container_name: tests
    build: .
    tty: true
    volumes:
      - .:/app
    command: go test -v ./...
    profiles:
      - testrunner

volumes:
  api_postgres_data:
    name: api_postgres_data